<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Dual boot overview</title>
  <desc id="desc">Overview diagram for a dual boot setup with Windows on one SSD and two Linux distributions on another SSD booted through UEFI and GRUB.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3a3a" />
      <stop offset="100%" stop-color="#2f2f2f" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a4a" />
      <stop offset="100%" stop-color="#404040" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.22" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d8d8d8" />
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <rect x="475" y="110" width="250" height="72" rx="18" fill="#4c4c4c" stroke="#6a6a6a" stroke-width="2" filter="url(#shadow)" />
  <text x="600" y="154" fill="#f0f0f0" font-family="'Yu Gothic', 'Meiryo', sans-serif" font-size="28" font-weight="700" text-anchor="middle">UEFI</text>

  <rect x="485" y="220" width="230" height="72" rx="18" fill="#454545" stroke="#656565" stroke-width="2" filter="url(#shadow)" />
  <text x="600" y="264" fill="#f0f0f0" font-family="'Yu Gothic', 'Meiryo', sans-serif" font-size="28" font-weight="700" text-anchor="middle">GRUB</text>

  <rect x="120" y="330" width="460" height="170" rx="24" fill="url(#panel)" stroke="#676767" stroke-width="2" filter="url(#shadow)" />
  <text x="350" y="375" fill="#f4f4f4" font-family="'Yu Gothic', 'Meiryo', sans-serif" font-size="26" font-weight="700" text-anchor="middle">Linux SSD</text>
  <rect x="170" y="405" width="150" height="56" rx="14" fill="#535353" stroke="#737373" stroke-width="2" />
  <text x="245" y="440" fill="#efefef" font-family="'Yu Gothic', 'Meiryo', sans-serif" font-size="24" text-anchor="middle">Linux1</text>
  <rect x="380" y="405" width="150" height="56" rx="14" fill="#535353" stroke="#737373" stroke-width="2" />
  <text x="455" y="440" fill="#efefef" font-family="'Yu Gothic', 'Meiryo', sans-serif" font-size="24" text-anchor="middle">Linux2</text>

  <rect x="700" y="330" width="380" height="170" rx="24" fill="url(#panel)" stroke="#676767" stroke-width="2" filter="url(#shadow)" />
  <text x="890" y="375" fill="#f4f4f4" font-family="'Yu Gothic', 'Meiryo', sans-serif" font-size="26" font-weight="700" text-anchor="middle">Windows SSD</text>
  <rect x="785" y="405" width="210" height="56" rx="14" fill="#535353" stroke="#737373" stroke-width="2" />
  <text x="890" y="440" fill="#efefef" font-family="'Yu Gothic', 'Meiryo', sans-serif" font-size="24" text-anchor="middle">Windows</text>

  <line x1="600" y1="182" x2="600" y2="220" stroke="#d8d8d8" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="560" y1="292" x2="245" y2="404" stroke="#d8d8d8" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="600" y1="292" x2="455" y2="404" stroke="#d8d8d8" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="640" y1="292" x2="890" y2="404" stroke="#d8d8d8" stroke-width="4" marker-end="url(#arrow)" />
</svg>
